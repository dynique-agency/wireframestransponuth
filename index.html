<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calamiteiten App - Transpo-Nuth</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome CDN (Voor alle iconen) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM CDN -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel CDN (Voor het live compileren van JSX in de browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0B1120;
            -webkit-tap-highlight-color: transparent;
        }
        /* Custom scrollbar styling */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #334155; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569; 
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        function App() {
          const [appMode, setAppMode] = useState('login'); // 'login', 'buitendienst', 'admin'
          const [adminView, setAdminView] = useState('dashboard'); // 'dashboard', 'dossiers', 'stamdata', 'medewerkers'
          const [step, setStep] = useState(1); // Voor buitendienst wizard
          const [alertMessage, setAlertMessage] = useState(null); // Custom popup state
          
          // App State voor de invulvelden (Buitendienst)
          const [formData, setFormData] = useState({
            rijksweg: 'A2',
            hmp: '200.000',
            rijrichting: 'rechts',
            stroken: 1,
            omschrijving: '',
            klant: '',
            tijdMelding: '23-03-2026, 13:26',
            tijdAanwezig: '23-03-2026, 12:30',
            tijdAfgerond: '23-03-2026, 12:30',
            tijdAangemeld: '23-03-2026, 12:30',
            inspecteur: '',
            restschade: false,
            vervolgactie: false
          });

          const nextStep = () => setStep(prev => Math.min(prev + 1, 4));
          const prevStep = () => setStep(prev => Math.max(prev - 1, 1));

          // ==========================================
          // CUSTOM ALERT POPUP
          // ==========================================
          const renderAlert = () => {
            if (!alertMessage) return null;
            return (
              <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm px-4">
                <div className="bg-[#1e293b] border border-slate-700 p-6 rounded-2xl shadow-2xl max-w-sm w-full text-center transform transition-all scale-100 opacity-100">
                  <div className="w-16 h-16 rounded-full bg-green-500/20 text-green-500 flex items-center justify-center mx-auto mb-5 text-2xl border border-green-500/30">
                     <i className="fas fa-check"></i>
                  </div>
                  <h3 className="text-white text-lg font-bold mb-2">{alertMessage}</h3>
                  <p className="text-slate-400 text-sm mb-6">De PDF is succesvol gegenereerd en het dossier staat nu in het systeem.</p>
                  <button onClick={() => { setAlertMessage(null); setAppMode('admin'); setAdminView('dossiers'); }} className="bg-gradient-to-r from-orange-500 to-orange-400 hover:from-orange-400 hover:to-orange-500 text-white font-semibold py-3 rounded-xl w-full shadow-[0_0_15px_rgba(249,115,22,0.3)] transition-all">
                    Naar Admin Overzicht
                  </button>
                </div>
              </div>
            );
          };

          // ==========================================
          // 0. INLOGSCHERM
          // ==========================================
          if (appMode === 'login') {
            return (
              <div className="min-h-screen bg-[#0B1120] flex flex-col items-center justify-center p-4 text-slate-200 font-sans">
                <div className="mb-8 flex flex-col items-center">
                  <div className="w-16 h-16 bg-[#3b82f6] rounded-2xl flex items-center justify-center text-white text-2xl font-bold mb-4 shadow-lg shadow-blue-500/20">TN</div>
                  <h1 className="text-2xl font-bold text-white mb-1">Transpo-Nuth</h1>
                  <p className="text-slate-400 text-sm">Calamiteiten App</p>
                </div>

                <div className="w-full max-w-sm bg-[#1e293b] rounded-2xl p-6 shadow-xl border border-slate-800">
                  <h2 className="text-xl font-semibold text-white mb-1">Inloggen</h2>
                  <p className="text-slate-400 text-sm mb-6">Kies uw demo-omgeving</p>

                  <div className="space-y-4">
                    <button 
                      onClick={() => { setAppMode('buitendienst'); setStep(1); }}
                      className="w-full bg-[#0f172a] border border-slate-700 hover:border-orange-500 text-white font-medium py-3.5 rounded-xl flex items-center justify-center gap-3 transition-all"
                    >
                      <i className="fas fa-car text-orange-500 text-lg"></i>
                      Inloggen als Chauffeur
                    </button>
                    <button 
                      onClick={() => { setAppMode('admin'); setAdminView('dashboard'); }}
                      className="w-full bg-[#0f172a] border border-slate-700 hover:border-blue-500 text-white font-medium py-3.5 rounded-xl flex items-center justify-center gap-3 transition-all"
                    >
                      <i className="fas fa-cog text-blue-500 text-lg"></i>
                      Inloggen als Admin (Kantoor)
                    </button>
                  </div>
                </div>
                <p className="mt-8 text-xs text-slate-600">Calamiteiten App v1.0 — Transpo-Nuth BV</p>
              </div>
            );
          }

          // ==========================================
          // 1. BUITENDIENST WEERGAVE (Mobile First)
          // ==========================================
          if (appMode === 'buitendienst') {
            const renderHeader = () => {
              const steps = [ { id: 1, label: 'Locatie' }, { id: 2, label: 'CROW' }, { id: 3, label: 'Registratie' }, { id: 4, label: "Foto's" } ];
              return (
                <div className="flex justify-between items-center mb-8 pt-4">
                  {steps.map((s, index) => (
                    <div key={s.id} className="flex flex-col items-center flex-1 relative">
                      {index !== 0 && <div className={`absolute top-4 -left-[50%] w-full h-0.5 ${step >= s.id ? 'bg-green-500' : 'bg-slate-800'}`}></div>}
                      <div className={`z-10 w-8 h-8 rounded-full flex items-center justify-center text-sm font-semibold mb-2 ${
                        step > s.id ? 'bg-green-500 text-white' : step === s.id ? 'bg-orange-500 text-white shadow-[0_0_10px_rgba(249,115,22,0.5)]' : 'bg-[#1e293b] text-slate-500 border border-slate-700'
                      }`}>
                        {step > s.id ? <i className="fas fa-check text-sm"></i> : s.id}
                      </div>
                      <span className={`text-[10px] sm:text-xs ${step === s.id ? 'text-orange-500 font-medium' : step > s.id ? 'text-green-500' : 'text-slate-500'}`}>{s.label}</span>
                    </div>
                  ))}
                </div>
              );
            };

            const renderStepLocatie = () => (
              <div className="space-y-6 pb-4 animate-in fade-in duration-300">
                <div>
                  <h2 className="text-xl font-bold text-white mb-1">Locatie</h2>
                  <p className="text-slate-400 text-sm">Waar heeft de calamiteit plaatsgevonden?</p>
                </div>
                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">WEGVAK</h3>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Rijksweg <span className="text-orange-500">*</span></label>
                      <input type="text" placeholder="bijv. A2 of N325" value={formData.rijksweg} onChange={e => setFormData({...formData, rijksweg: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-3 rounded-xl outline-none focus:border-orange-500" />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Hectometerpaal (HMP) <span className="text-orange-500">*</span></label>
                      <input type="text" placeholder="bijv. 255.100" value={formData.hmp} onChange={e => setFormData({...formData, hmp: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-3 rounded-xl outline-none focus:border-orange-500" />
                    </div>
                  </div>
                </div>
                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">RIJRICHTING</h3>
                  <div className="flex bg-[#0f172a] rounded-xl p-1 border border-slate-700">
                    <button onClick={() => setFormData({...formData, rijrichting: 'rechts'})} className={`flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors ${formData.rijrichting === 'rechts' ? 'bg-orange-500 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Rechts (Oplopend)</button>
                    <button onClick={() => setFormData({...formData, rijrichting: 'links'})} className={`flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors ${formData.rijrichting === 'links' ? 'bg-orange-500 text-white' : 'text-slate-400 hover:text-slate-200'}`}>Links (Aflopend)</button>
                  </div>
                </div>
                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">SCENARIO</h3>
                  <div className="flex bg-[#0f172a] rounded-xl p-1 border border-slate-700 mb-3">
                    <button onClick={() => setFormData({...formData, stroken: 1})} className={`flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors ${formData.stroken === 1 ? 'bg-orange-500 text-white' : 'text-slate-400 hover:text-slate-200'}`}>1 Strook</button>
                    <button onClick={() => setFormData({...formData, stroken: 2})} className={`flex-1 py-2.5 text-sm font-medium rounded-lg transition-colors ${formData.stroken === 2 ? 'bg-orange-500 text-white' : 'text-slate-400 hover:text-slate-200'}`}>2 Stroken</button>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div className={`p-4 rounded-xl border flex flex-col items-center justify-center text-center cursor-pointer transition-colors ${formData.stroken === 1 ? 'border-orange-500 bg-[#0f172a]' : 'border-slate-700 bg-[#0f172a] opacity-50'}`} onClick={() => setFormData({...formData, stroken: 1})}>
                      <i className="fas fa-car text-red-400 text-3xl mb-2"></i>
                      <span className={`text-xs ${formData.stroken === 1 ? 'text-orange-400' : 'text-slate-400'}`}>Één rijstrook afgesloten — standaard bebording</span>
                    </div>
                    <div className={`p-4 rounded-xl border flex flex-col items-center justify-center text-center cursor-pointer transition-colors ${formData.stroken === 2 ? 'border-orange-500 bg-[#0f172a]' : 'border-slate-700 bg-[#0f172a] opacity-50'}`} onClick={() => setFormData({...formData, stroken: 2})}>
                      <div className="flex gap-2 mb-2"><i className="fas fa-car text-red-400 text-3xl"></i><i className="fas fa-car text-red-400 text-3xl"></i></div>
                      <span className={`text-xs ${formData.stroken === 2 ? 'text-orange-400' : 'text-slate-400'}`}>Twee rijstroken afgesloten — uitgebreide bebording</span>
                    </div>
                  </div>
                </div>
              </div>
            );

            const renderStepCROW = () => (
              <div className="space-y-6 pb-4 animate-in fade-in duration-300">
                <div>
                  <h2 className="text-xl font-bold text-white mb-1">CROW Berekening</h2>
                  <p className="text-slate-400 text-sm">Bordinstellingen op basis van HMP {formData.hmp} — {formData.rijksweg}</p>
                </div>
                <div className="flex justify-between items-center text-sm">
                  <div className="flex items-center text-green-500 font-medium"><div className="w-2 h-2 bg-green-500 rounded-full mr-2"></div>5 borden berekend</div>
                  <button className="flex items-center text-slate-400 hover:text-white transition-colors"><i className="fas fa-sync-alt mr-2 text-sm"></i> Herbereken</button>
                </div>
                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">BORDINSTELLINGEN</h3>
                  <div className="space-y-3">
                    {[
                      { id: 1, name: 'Pijlwagen', val: '199.850' },
                      { id: 2, name: 'Afzetting start', val: '199.700' },
                      { id: 3, name: 'Waarschuwing 1', val: '199.500' },
                      { id: 4, name: 'Waarschuwing 2', val: '199.500' },
                      { id: 5, name: 'Waarschuwing 3', val: '199.000' }
                    ].map(item => (
                      <div key={item.id} className="flex justify-between items-center bg-[#0f172a] border border-slate-700 rounded-xl p-3">
                        <div className="flex items-center gap-3">
                          <div className="w-6 h-6 rounded bg-orange-500/20 text-orange-500 flex items-center justify-center text-xs font-bold">{item.id}</div>
                          <span className="text-sm font-medium text-slate-200">{item.name}</span>
                        </div>
                        <span className="text-sm font-mono text-white">{item.val}</span>
                      </div>
                    ))}
                  </div>
                </div>
                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800 flex gap-4">
                  <div className="bg-[#0f172a] p-3 rounded-lg h-fit border border-slate-700 flex items-center justify-center"><i className="fas fa-map-marker-alt text-blue-400 text-xl"></i></div>
                  <div>
                    <h4 className="text-sm font-semibold text-white mb-1">Handmatige overschrijving</h4>
                    <p className="text-xs text-slate-400 mb-3 leading-relaxed">In het veld kan de werkelijke weg afwijken van de berekening door HMP-sprongen. Activeer overschrijving om posities aan te passen.</p>
                    <button className="w-full bg-[#0f172a] border border-orange-500/50 hover:bg-orange-500/10 text-orange-400 text-sm font-medium py-2.5 rounded-xl flex items-center justify-center gap-2 transition-colors"><i className="fas fa-edit text-sm"></i> Posities handmatig aanpassen</button>
                  </div>
                </div>

                <div className="space-y-3 pt-2">
                  <button onClick={() => alert('Navigeren naar Google Maps...')} className="w-full bg-gradient-to-r from-red-600 to-red-500 hover:from-red-500 hover:to-red-400 text-white text-sm font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-red-500/20 transition-all">
                    <i className="fas fa-map-marker-alt"></i> Locatie Calamiteit (HMP {formData.hmp})
                  </button>
                  <button onClick={() => alert('Navigeren naar Google Maps...')} className="w-full bg-gradient-to-r from-green-600 to-green-500 hover:from-green-500 hover:to-green-400 text-white text-sm font-semibold py-3.5 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-green-500/20 transition-all">
                    <i className="fas fa-exclamation-triangle"></i> Locatie Eerste Waarschuwing (HMP {(parseFloat(formData.hmp || 0) - 1.0).toFixed(3)})
                  </button>
                </div>
                <p className="text-center text-xs text-slate-500 px-4">GPS via RWS hectometerpaal-database (PDOK) · plaatst een exacte pin op Google Maps</p>
              </div>
            );

            const renderStepRegistratie = () => (
              <div className="space-y-6 pb-4 animate-in fade-in duration-300">
                <div>
                  <h2 className="text-xl font-bold text-white mb-1">Registratie</h2>
                  <p className="text-slate-400 text-sm">Vul de calamiteitsgegevens in</p>
                </div>

                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">OMSCHRIJVING</h3>
                  <textarea 
                    placeholder="Beschrijf hier wat er is gebeurd..." 
                    value={formData.omschrijving}
                    onChange={e => setFormData({...formData, omschrijving: e.target.value})}
                    className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-3 rounded-xl outline-none focus:border-orange-500 h-24 resize-none text-sm"
                  ></textarea>
                </div>

                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">KLANT</h3>
                  <select className="w-full bg-[#0f172a] border border-slate-700 text-slate-400 px-4 py-3 rounded-xl outline-none focus:border-orange-500 text-sm">
                    <option>— Onbekende opdrachtgever —</option>
                    <option>Strukton</option>
                    <option>Rijkswaterstaat</option>
                  </select>
                </div>

                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">TIJDSREGISTRATIE</h3>
                  <div className="space-y-4">
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Tijdstip melding <span className="text-orange-500">*</span></label>
                      <input type="text" value={formData.tijdMelding} onChange={e => setFormData({...formData, tijdMelding: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-2.5 rounded-xl outline-none text-sm" />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Tijdstip aanwezig op locatie <span className="text-orange-500">*</span></label>
                      <input type="text" value={formData.tijdAanwezig} onChange={e => setFormData({...formData, tijdAanwezig: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-2.5 rounded-xl outline-none text-sm" />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Tijdstip afgerond <span className="text-orange-500">*</span></label>
                      <input type="text" value={formData.tijdAfgerond} onChange={e => setFormData({...formData, tijdAfgerond: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-2.5 rounded-xl outline-none text-sm" />
                    </div>
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Tijdstip aangemeld bij verkeerscentrale</label>
                      <input type="text" value={formData.tijdAangemeld} onChange={e => setFormData({...formData, tijdAangemeld: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-2.5 rounded-xl outline-none text-sm" />
                    </div>
                  </div>
                </div>

                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">INGEZET MATERIEEL</h3>
                  <button className="w-full bg-transparent border border-dashed border-slate-600 hover:border-slate-400 text-slate-400 hover:text-slate-200 py-3 rounded-xl text-sm transition-colors">
                    + Voeg materieel toe
                  </button>
                </div>

                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-slate-400 tracking-wider mb-4">OVERIGE GEGEVENS</h3>
                  <div className="space-y-5">
                    <div>
                      <label className="block text-sm text-slate-300 mb-1.5">Naam inspecteur RWS <span className="text-orange-500">*</span></label>
                      <input type="text" placeholder="Voor- en achternaam" value={formData.inspecteur} onChange={e => setFormData({...formData, inspecteur: e.target.value})} className="w-full bg-[#0f172a] border border-slate-700 text-slate-200 px-4 py-2.5 rounded-xl outline-none text-sm focus:border-orange-500" />
                    </div>
                    
                    <div className="flex items-center justify-between">
                      <div>
                        <p className="text-sm font-medium text-slate-200">Restschade aanwezig</p>
                        <p className="text-xs text-slate-500 mt-0.5">Schade die achterblijft na de calamiteit</p>
                      </div>
                      <div onClick={() => setFormData({...formData, restschade: !formData.restschade})} className={`w-12 h-6 rounded-full relative cursor-pointer transition-colors ${formData.restschade ? 'bg-orange-500' : 'bg-[#0f172a] border border-slate-700'}`}>
                        <div className={`w-4 h-4 rounded-full absolute top-0.5 transition-transform ${formData.restschade ? 'bg-white left-7' : 'bg-slate-400 left-1'}`}></div>
                      </div>
                    </div>

                    <div className="flex items-center justify-between">
                      <div>
                        <p className="text-sm font-medium text-slate-200">Vervolgactie vereist</p>
                        <p className="text-xs text-slate-500 mt-0.5">Er is een vervolgactie nodig na deze calamiteit</p>
                      </div>
                      <div onClick={() => setFormData({...formData, vervolgactie: !formData.vervolgactie})} className={`w-12 h-6 rounded-full relative cursor-pointer transition-colors ${formData.vervolgactie ? 'bg-orange-500' : 'bg-[#0f172a] border border-slate-700'}`}>
                        <div className={`w-4 h-4 rounded-full absolute top-0.5 transition-transform ${formData.vervolgactie ? 'bg-white left-7' : 'bg-slate-400 left-1'}`}></div>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="bg-[#1e293b] p-4 rounded-2xl border border-slate-800">
                  <h3 className="text-xs font-semibold text-yellow-500 flex items-center gap-2 mb-4 tracking-wider"><i className="fas fa-exclamation-triangle"></i> VEILIGHEIDSCHECKLIST (VERPLICHT)</h3>
                  <div className="space-y-6">
                    {[
                      { id: 1, text: "Gebruik van PBM's (oranje hesjes, e.d.).", icon: "🦺" },
                      { id: 2, text: "Er zijn foto's gemaakt van de calamiteit.", icon: "📷" },
                      { id: 3, text: "Er zijn foto's gemaakt van de aanpak.", icon: "📸" },
                      { id: 4, text: "De weg is weer veilig, materialen zijn opgeruimd.", icon: "✅" },
                      { id: 5, text: "Stortbon ontvangen van afgevoerde materialen.", icon: "🧾" }
                    ].map(q => (
                      <div key={q.id}>
                        <div className="flex gap-3 mb-3">
                          <span className="text-lg">{q.icon}</span>
                          <p className="text-sm text-slate-200">{q.text}</p>
                        </div>
                        <div className="flex gap-2">
                          <button className="flex-1 py-2 rounded-xl text-sm font-medium border border-slate-700 bg-[#0f172a] text-slate-400 hover:bg-slate-800 transition-colors"><i className="fas fa-check mr-2"></i> Ja</button>
                          <button className="flex-1 py-2 rounded-xl text-sm font-medium border border-slate-700 bg-[#0f172a] text-slate-400 hover:bg-slate-800 transition-colors"><i className="fas fa-times mr-2"></i> Nee</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            );

            const renderStepFotos = () => (

                              {mockMedewerkers.map((row, i) => (
                                <tr key={i} className="hover:bg-[#0f172a] transition-colors">
                                  <td className="py-3 pr-4">
                                    <div className="flex items-center gap-3">
                                      <div className="w-8 h-8 rounded-full bg-slate-700 text-white flex items-center justify-center text-xs font-bold">{row.naam.charAt(0)}</div>
                                      <span className="text-slate-200 font-medium">{row.naam}</span>
                                    </div>
                                  </td>
                                  <td className="py-3 pr-4">
                                    {row.rol === 'Admin' ? (
                                      <span className="inline-flex items-center gap-1 text-orange-400 text-xs font-medium"><span className="text-[10px]">⭐</span> Admin</span>
                                    ) : (
                                      <span className="inline-flex items-center gap-1 text-blue-400 text-xs font-medium"><i className="fas fa-users text-[10px]"></i> Medewerker</span>
                                    )}
                                  </td>
                                  <td className="py-3 text-slate-400 font-mono text-xs pr-4">{row.id}</td>
                                  <td className="py-3 pr-4"><span className="px-2 py-1 rounded bg-green-500/10 border border-green-500/20 text-green-500 text-xs font-medium">{row.status}</span></td>
                                  <td className="py-3 text-slate-500 text-xs pr-4">{row.sinds}</td>
                                  <td className="py-3 text-right">
                                    <button className="text-red-400 hover:text-red-300 text-xs font-medium underline transition-colors">Deactiveer</button>
                                  </td>
                                </tr>
                              ))}
                            </tbody>
                          </table>
                        </div>

                        <div className="border border-dashed border-slate-600 rounded-xl bg-[#0f172a] p-8 flex flex-col items-center justify-center text-center cursor-pointer hover:border-slate-400 transition-colors">
                          <i className="fas fa-paperclip text-slate-400 text-2xl mb-2"></i>
                          <p className="text-sm font-medium text-slate-300">Sleep een CSV hier of klik om te bladeren</p>
                          <p className="text-xs text-slate-500 mt-1">Kolommen: naam, external_id, wachtwoord, rol (Admin/Medewerker)</p>
                        </div>
                      </div>
                    </div>
                  )}

                </div>

                {/* Admin Bottom Navigation */}
                <div className="fixed bottom-0 left-0 right-0 bg-[#0B1120] border-t border-slate-800 flex justify-center items-center py-3 z-50">
                   <div className="flex w-full max-w-lg justify-around items-center px-4">
                      <button onClick={() => setAdminView('dashboard')} className={`flex flex-col items-center gap-1 transition-colors ${adminView === 'dashboard' ? 'text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                        <i className="fas fa-home text-lg"></i>
                        <span className="text-[10px] font-medium">Dashboard</span>
                      </button>
                      <button onClick={() => setAdminView('dossiers')} className={`flex flex-col items-center gap-1 transition-colors ${adminView === 'dossiers' ? 'text-white' : 'text-slate-500 hover:text-slate-300'}`}>
                        <i className="fas fa-list text-lg"></i>
                        <span className="text-[10px] font-medium">Dossiers</span>
                      </button>
                      <button onClick={() => { setAppMode('buitendienst'); setStep(1); }} className="w-12 h-12 bg-orange-500 rounded-xl flex items-center justify-center text-white shadow-lg shadow-orange-500/30 hover:bg-orange-400 transition-colors -translate-y-4">
                        <i className="fas fa-plus text-xl"></i>
                      </button>
                      <button onClick={() => setAdminView('stamdata')} className={`flex flex-col items-center gap-1 transition-colors ${adminView === 'stamdata' || adminView === 'medewerkers' ? 'text-orange-500' : 'text-slate-500 hover:text-slate-300'}`}>
                        <i className="fas fa-cog text-lg"></i>
                        <span className="text-[10px] font-medium">Admin</span>
                      </button>
                   </div>
                </div>
              </div>
            );
          }

          return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
